[algokit]
min_version = "v2.0.0"

[project]
type = "contract"
name = "fianza-contracts"

[project.deploy]
command = "poetry run python -m smart_contracts deploy"
environment_secrets = []

[project.deploy.environment]
ALGOD_SERVER = "https://testnet-api.algonode.cloud"
ALGOD_PORT = "443"
ALGOD_TOKEN = ""
INDEXER_SERVER = "https://testnet-idx.algonode.cloud"
INDEXER_PORT = "443"
INDEXER_TOKEN = ""
